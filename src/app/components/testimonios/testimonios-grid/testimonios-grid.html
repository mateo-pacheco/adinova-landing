<section id="testimonios-ver" class="relative px-5 py-10 text-white sm:px-8 sm:py-12 lg:px-10 lg:py-20">
  <div class="mx-auto max-w-7xl">
    <div class="grid gap-5 border-t border-white/10 pt-6 sm:gap-6 sm:pt-8">
      <div data-scroll-reveal class="max-w-xl">
        <p class="text-[10px] uppercase tracking-[0.32em] text-[#2BBFB3] sm:text-[11px]">Testimonios</p>
        <h2 class="mt-3 text-2xl font-medium leading-tight text-white sm:mt-4 sm:text-3xl lg:text-4xl">
          Experiencias reales.
        </h2>
        <p class="mt-3 text-xs leading-6 text-white/70 sm:text-sm sm:leading-7">
          Clientes que han confiado en nosotros para hacer realidad sus proyectos.
        </p>
      </div>
    </div>

    <div class="testimonios-grid mt-10 sm:mt-12 lg:mt-14">
      @for (testimonio of testimonios; track testimonio.id) {
        <article class="testimonio-card" data-scroll-reveal>
          <div class="card-accent"></div>
          
          <div class="card-body">
            <p class="card-text">{{ testimonio.text }}</p>
          </div>

          <div class="card-footer">
            <div class="avatar">{{ getInitials(testimonio.name) }}</div>
            <div class="card-info">
              <h3 class="card-name">{{ testimonio.name }}</h3>
            </div>
          </div>
        </article>
      }
    </div>
  </div>
</section>
