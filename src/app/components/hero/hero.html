<section
  id="inicio"
  class="hero-container min-h-screen relative w-full"
>
  <div class="hero-glow absolute inset-0 pointer-events-none"></div>
  
  <div class="relative z-10 mx-auto flex h-full w-full max-w-4xl flex-col items-center justify-center px-6 py-10 text-center">
    <div data-animate class="mb-5">
      <img
        src="assets/logo/Logo.webp"
        alt="ADINOVA"
        class="hero-logo h-20 w-auto object-contain md:h-28 lg:h-36"
      />
    </div>

    <div data-animate class="hero-badge mb-4">
      <span class="text-[10px] font-medium uppercase tracking-[0.35em] text-[#36A8A8]">Architecture Studio</span>
    </div>

    <h1 data-animate class="hero-title text-3xl font-light leading-tight text-white md:text-4xl lg:text-5xl">
      Espacios precisos, sobrios y atemporales.
    </h1>

    <p data-animate class="hero-description mt-3 max-w-md text-sm text-white/50 md:text-base">
      Creamos proyectos arquitectonicos con rigor conceptual y sensibilidad material.
    </p>

    <div data-animate class="hero-actions mt-7 flex flex-col items-center gap-3 sm:flex-row">
      <a
        href="#contacto"
        data-magnetic
        class="hero-btn-primary rounded-full border border-[#36A8A8]/40 bg-transparent px-7 py-2.5 text-sm font-medium uppercase tracking-[0.22em] text-white transition-all duration-300 hover:border-[#36A8A8]"
      >
        Iniciar proyecto
      </a>

      <a
        href="#servicios"
        data-magnetic
        class="hero-btn-secondary rounded-full border border-white/10 bg-white/5 px-7 py-2.5 text-sm font-medium uppercase tracking-[0.22em] text-white/60 transition-all duration-300 hover:border-white/20 hover:text-white"
      >
        Servicios
      </a>
    </div>

    <div data-animate class="hero-stats mt-8 flex items-center gap-6 border-t border-white/10 pt-6 md:gap-8">
      <div class="text-center">
        <p class="hero-stat-value text-2xl font-light text-white md:text-3xl lg:text-4xl">12+</p>
        <p class="mt-1 text-[9px] uppercase tracking-[0.2em] text-white/40">Anos</p>
      </div>
      
      <div class="h-8 w-px bg-white/10"></div>
      
      <div class="text-center">
        <p class="hero-stat-value text-2xl font-light text-white md:text-3xl lg:text-4xl">48</p>
        <p class="mt-1 text-[9px] uppercase tracking-[0.2em] text-white/40">Proyectos</p>
      </div>
      
      <div class="h-8 w-px bg-white/10"></div>
      
      <div class="text-center">
        <p class="hero-stat-value text-2xl font-light text-white md:text-3xl lg:text-4xl">03</p>
        <p class="mt-1 text-[9px] uppercase tracking-[0.2em] text-white/40">Ciudades</p>
      </div>
    </div>
  </div>
</section>
