<section id="legal-faq" class="relative px-5 py-10 text-white sm:px-8 sm:py-12 lg:px-10 lg:py-20">
  <div class="faq-3d-container absolute inset-0 pointer-events-none hidden lg:block">
    <canvas #canvas3d class="faq-canvas"></canvas>
  </div>
  
  <div class="mx-auto max-w-7xl">
    <div class="grid gap-5 border-t border-white/10 pt-6 sm:gap-6 sm:pt-8 lg:grid-cols-[1fr_1.5fr] lg:items-end">
      <div data-scroll-reveal class="max-w-xl">
        <p class="text-[10px] uppercase tracking-[0.32em] text-[#36A8A8] sm:text-[11px]">FAQ</p>
        <h2 class="mt-3 text-2xl font-medium leading-tight text-white sm:mt-4 sm:text-3xl lg:text-4xl">
          Preguntas frecuentes.
        </h2>
        <p class="mt-3 text-xs leading-6 text-white/70 sm:text-sm sm:leading-7">
          Respuestas a las dudas más comunes sobre permisos y asesoría legal arquitectónica.
        </p>
      </div>
    </div>

    <div class="faq-grid mt-12 sm:mt-14 lg:mt-16">
      @for (faq of faqs; track faq.id; let i = $index) {
        <article 
          class="faq-item" 
          [class.faq-item-expanded]="isExpanded(faq.id)"
          (click)="toggleFaq(faq.id)"
        >
          <div class="faq-header">
            <span class="faq-number">{{ faq.id }}</span>
            <h3 class="faq-title">{{ faq.question }}</h3>
            <i class="faq-icon fa-solid" [class.fa-chevron-down]="!isExpanded(faq.id)" [class.fa-chevron-up]="isExpanded(faq.id)"></i>
          </div>
          
          @if (isExpanded(faq.id)) {
            <div class="faq-answer">
              <p>{{ faq.answer }}</p>
            </div>
          }
        </article>
      }
    </div>

    <div class="mt-12 flex justify-center sm:mt-14">
      <a 
        href="#legal-proceso"
        class="faq-cta diseno-cta rounded-full border border-[#36A8A8]/30 bg-[#36A8A8]/10 px-8 py-4 text-[11px] uppercase tracking-[0.2em] text-[#36A8A8] transition-all duration-300 hover:border-[#36A8A8]/50 hover:bg-[#36A8A8]/20 hover:text-white"
      >
        Resolver todas mis dudas
        <i class="fa-solid fa-arrow-right ml-2"></i>
      </a>
    </div>
  </div>
</section>
