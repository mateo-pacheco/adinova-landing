<section class="px-6 pt-16 pb-8 text-white sm:pt-20 sm:pb-10 lg:pt-24 lg:pb-12">
  <div
    class="marquee-container group relative mx-auto max-w-7xl overflow-hidden border border-white/[0.06] bg-white/[0.015] py-5 sm:py-6"
    (mouseenter)="onEnter()"
    (mouseleave)="onLeave()"
  >
    <div
      #track
      class="marquee-track flex w-max items-stretch"
      [class.marquee-paused]="paused"
    >
      @for (loop of [0, 1]; track loop) {
        <div class="flex items-stretch">
          @for (item of items; track item.title) {
            <article
              class="group/card mx-2 w-[17rem] shrink-0 overflow-hidden border border-white/[0.06] bg-white/[0.03] transition-all duration-300 hover:border-white/[0.12] hover:bg-white/[0.05] sm:mx-3 sm:w-[21rem]"
            >
              <div class="relative overflow-hidden">
                <img [src]="item.image" [alt]="item.label" loading="lazy" decoding="async" class="h-40 w-full object-cover transition-all duration-500 group-hover/card:scale-105 sm:h-48" />
                <div class="absolute inset-0 bg-gradient-to-t from-black/40 to-transparent opacity-0 transition-opacity duration-300 group-hover/card:opacity-100"></div>
              </div>

              <div class="px-4 py-3.5 sm:px-5 sm:py-4">
                <p class="text-xs uppercase tracking-[0.2em] text-white/70 group-hover/card:text-white/90 transition-colors">{{ item.title }}</p>
              </div>
            </article>
          }
        </div>
      }
    </div>

    <button
      type="button"
      (click)="prev()"
      class="marquee-btn marquee-btn-left"
      aria-label="Anterior"
    >
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M15 18l-6-6 6-6"/>
      </svg>
    </button>

    <button
      type="button"
      (click)="next()"
      class="marquee-btn marquee-btn-right"
      aria-label="Siguiente"
    >
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 18l6-6-6-6"/>
      </svg>
    </button>
  </div>
</section>
