<header
  class="navbar-container"
>
  <nav class="navbar mx-auto flex max-w-6xl items-center justify-between px-5 py-3 lg:px-6">
    <a href="#inicio" class="navbar-logo flex items-center gap-2" aria-label="Ir al inicio">
      <img src="assets/logo/Logo-nav.webp" alt="Adinova" class="h-7 w-7 object-contain lg:h-8 lg:w-8" />
      <div class="navbar-brand flex flex-col">
        <span class="text-xs font-medium uppercase tracking-[0.28em] text-white">Adinova</span>
        <span class="text-[9px] uppercase tracking-[0.16em] text-white/50">Architecture</span>
      </div>
    </a>

    <div class="navbar-links hidden items-center gap-6 lg:flex">
      @for (link of links; track link.label) {
        <a
          [href]="link.href"
          class="navbar-link text-[10px] uppercase tracking-[0.2em] transition-colors duration-300"
        >
          {{ link.label }}
        </a>
      }
    </div>

    <div class="hidden lg:block">
      <a
        href="#contacto"
        class="navbar-cta rounded-full px-4 py-1.5 text-[10px] uppercase tracking-[0.18em] transition-all duration-300"
      >
        Contacto
      </a>
    </div>

    <button
      type="button"
      class="navbar-toggle flex h-10 w-10 items-center justify-center rounded-full border transition-all duration-300 lg:hidden"
      (click)="toggleMenu()"
      [attr.aria-expanded]="isMenuOpen()"
      aria-label="Abrir menu"
    >
      @if (isMenuOpen()) {
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-5 h-5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      } @else {
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-5 h-5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5"/>
        </svg>
      }
    </button>
  </nav>

  @if (isMenuOpen()) {
    <div class="navbar-mobile border-t border-white/8 bg-[#0a0a0a]/90 px-5 py-5 lg:hidden">
      <div class="flex flex-col gap-1">
        @for (link of links; track link.label) {
          <a
            [href]="link.href"
            class="navbar-mobile-link rounded-lg px-4 py-3.5 text-[12px] uppercase tracking-[0.2em] transition-all duration-200"
            (click)="closeMenu()"
          >
            {{ link.label }}
          </a>
        }

        <a
          href="#contacto"
          class="navbar-mobile-cta mt-2 rounded-lg border px-4 py-3.5 text-center text-[12px] uppercase tracking-[0.2em] transition-all duration-200"
          (click)="closeMenu()"
        >
          Contacto
        </a>
      </div>
    </div>
  }
</header>
