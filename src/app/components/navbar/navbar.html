<header [class.nav-scrolled]="isScrolled()">
  <nav class="nav-inner">

    <!-- LOGO -->
    <a href="/" class="nav-logo" aria-label="Ir al inicio">
      <img src="assets/logo/Logo-nav.webp" alt="ADINOVA" class="nav-logo-img" />
      <span class="nav-logo-text">ADINOVA</span>
    </a>

    <!-- LINKS DESKTOP -->
    <div class="nav-links">
      @for (link of links; track link.label) {
        @if (link.route) {
          <a [routerLink]="link.route"
             class="nav-link"
             routerLinkActive="nav-link-active">
            {{ link.label }}
          </a>
        } @else {
          <a [href]="link.href" class="nav-link">
            {{ link.label }}
          </a>
        }
      }
    </div>

    <!-- CTA + TOGGLE -->
    <div class="nav-actions">
      <a href="#contacto" class="nav-cta">Contacto</a>
      <button class="nav-toggle"
              (click)="toggleMenu()"
              [attr.aria-expanded]="isMenuOpen()"
              aria-label="Menú">
        <span class="nav-toggle-bar"></span>
        <span class="nav-toggle-bar nav-toggle-bar-mid"></span>
        <span class="nav-toggle-bar"></span>
      </button>
    </div>

  </nav>

  <!-- MOBILE MENU -->
  @if (isMenuOpen()) {
    <div class="nav-mobile">
      @for (link of links; track link.label) {
        @if (link.route) {
          <a [routerLink]="link.route"
             class="nav-mobile-link"
             routerLinkActive="nav-mobile-link-active"
             (click)="closeMenu()">{{ link.label }}</a>
        } @else {
          <a [href]="link.href"
             class="nav-mobile-link"
             (click)="closeMenu()">{{ link.label }}</a>
        }
      }
      <a href="#contacto" class="nav-mobile-cta"
         (click)="closeMenu()">Contacto</a>
    </div>
  }
</header>
