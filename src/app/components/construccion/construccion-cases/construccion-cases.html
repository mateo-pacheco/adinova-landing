<section id="construccion-proyectos" class="relative px-5 py-10 text-white sm:px-8 sm:py-12 lg:px-10 lg:py-20">
  <div class="gallery-3d-container absolute inset-0 pointer-events-none hidden lg:block">
    <canvas #canvas3d class="gallery-canvas"></canvas>
  </div>
  
  <div class="mx-auto max-w-7xl">
    <div class="max-w-xl border-t border-white/10 pt-6 sm:pt-8">
      <p class="text-[10px] uppercase tracking-[0.32em] text-[#36A8A8] sm:text-[11px]">Proyectos</p>
      <h2 class="mt-3 text-2xl font-medium leading-tight text-white sm:mt-4 sm:text-3xl lg:text-4xl">
        Obras ejecutadas.
      </h2>
      <p class="mt-3 text-xs leading-6 text-white/70 sm:text-sm sm:leading-7">
        Proyectos de construccion ejecutados con los mas altos estandares de calidad.
      </p>
    </div>

    <div class="projects-grid mt-10 sm:mt-12 lg:mt-14">
      @for (project of projects; track project.id) {
        <article class="project-card">
          <div class="project-image">
            <img [src]="project.image" [alt]="project.title" loading="lazy" />
          </div>
          
          <div class="project-content">
            <div class="project-meta">
              <span class="project-category">{{ project.category }}</span>
              <span class="project-location">{{ project.location }}</span>
            </div>
            
            <h3 class="project-title">{{ project.title }}</h3>
            
            <p class="project-description">{{ project.description }}</p>
          </div>
        </article>
      }
    </div>
  </div>
</section>
