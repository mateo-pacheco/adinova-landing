<section id="servicios" class="px-6 py-14 text-white lg:px-10 lg:py-20">
  <div class="mx-auto max-w-7xl">
    <div class="grid gap-6 border-t border-white/10 pt-8 lg:grid-cols-[0.9fr_1.1fr] lg:items-end">
      <div data-scroll-reveal class="max-w-xl">
        <p class="text-[11px] uppercase tracking-[0.32em] text-[#36A8A8]">Servicios</p>
        <h2 class="mt-4 text-3xl font-medium leading-tight text-white sm:text-4xl">
          Servicios con una logica clara y una expresion sobria.
        </h2>
      </div>

      <p
        data-scroll-reveal
        class="max-w-xl text-sm leading-7 text-white/70 sm:text-base lg:justify-self-end"
      >
        Cada servicio combina criterio arquitectonico, detalle tecnico y una experiencia visual
        sobria.
      </p>
    </div>

    <div data-stagger-reveal class="mt-14 grid gap-4 sm:grid-cols-2 xl:grid-cols-3">
      @for (item of items; track item.index) {
        <article
          class="premium-card overflow-hidden rounded-[1.6rem] border border-white/10 bg-white/[0.04]"
        >
          <img
            [src]="item.image"
            [alt]="item.label"
            class="h-36 w-full object-cover opacity-90 sm:h-40"
          />

          <div class="border-t border-white/10 p-5 sm:p-6">
            <div class="flex items-center justify-between">
              <span class="text-[11px] uppercase tracking-[0.28em] text-[#36A8A8]">{{
                item.index
              }}</span>
              <span class="glow-dot h-1.5 w-1.5 rounded-full bg-[#36A8A8]"></span>
            </div>

            <h3 class="mt-6 text-lg font-medium leading-snug text-white">
              {{ item.title }}
            </h3>

            <p class="mt-3 text-sm leading-7 text-white/70">
              {{ item.description }}
            </p>
          </div>
        </article>
      }
    </div>
  </div>
</section>
