<section id="servicios" class="relative px-5 pt-0 pb-10 text-white sm:px-8 sm:pb-12 lg:px-10 lg:pb-20">
  
  <div class="mx-auto max-w-7xl">
    <div class="grid gap-5 border-t border-white/10 pt-6 sm:gap-6 sm:pt-8 lg:grid-cols-[0.9fr_1.1fr] lg:items-end">
      <div data-scroll-reveal class="max-w-xl">
        <p class="text-[10px] uppercase tracking-[0.32em] text-[#2BBFB3] sm:text-[11px]">Servicios</p>
        <h2 class="mt-3 text-2xl font-medium leading-tight text-white sm:mt-4 sm:text-3xl lg:text-4xl">
          Servicios con una lógica clara y una expresión sobria.
        </h2>
      </div>

      <p
        data-scroll-reveal
        class="max-w-xl text-xs leading-6 text-white/70 sm:text-sm sm:leading-7 lg:justify-self-end"
      >
        Cada servicio combina criterio arquitectónico, detalle técnico y una experiencia visual
        sobria.
      </p>
    </div>

    <div data-stagger-reveal class="mt-10 grid gap-3 sm:grid-cols-2 sm:gap-4 sm:mt-12 lg:mt-14 xl:grid-cols-3">
      @for (item of items; track item.index) {
        <article
          class="premium-card overflow-hidden rounded-[1.4rem] border border-white/10 bg-white/[0.04] sm:rounded-[1.6rem]"
        >
          <img
            [src]="item.image"
            [alt]="item.label"
            loading="lazy"
            decoding="async"
            class="h-28 w-full object-cover opacity-90 sm:h-32 lg:h-36"
          />

          <div class="border-t border-white/10 p-4 sm:p-5 lg:p-6">
            <div class="flex items-center justify-between">
              <span class="text-[10px] uppercase tracking-[0.26em] text-[#2BBFB3] sm:text-[11px]">{{
                item.index
              }}</span>
              <span class="glow-dot h-1.5 w-1.5 rounded-full bg-[#2BBFB3]"></span>
            </div>

            <h3 class="mt-4 sm:mt-5 lg:mt-6 text-base font-medium leading-snug text-white sm:text-lg">
              {{ item.title }}
            </h3>

            <p class="mt-2 sm:mt-3 text-xs leading-6 text-white/70 sm:text-sm">
              {{ item.description }}
            </p>
          </div>
        </article>
      }
    </div>
  </div>
</section>
