<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
  <defs>
    <pattern id="concrete-tex" width="6" height="6" patternUnits="userSpaceOnUse">
      <rect width="6" height="6" fill="#B0A898"/>
      <circle cx="1" cy="2" r="0.4" fill="#A09888" opacity="0.5"/>
      <circle cx="4" cy="5" r="0.5" fill="#C0B8A8" opacity="0.4"/>
      <circle cx="3" cy="1" r="0.3" fill="#989080" opacity="0.6"/>
    </pattern>
    <pattern id="wood-tex" width="8" height="60" patternUnits="userSpaceOnUse">
      <rect width="8" height="60" fill="#C89860"/>
      <rect x="0" y="0" width="8" height="2" fill="#D0A870" opacity="0.4"/>
      <rect x="0" y="10" width="8" height="1.5" fill="#B88848" opacity="0.3"/>
      <rect x="0" y="22" width="8" height="2" fill="#D0A870" opacity="0.35"/>
      <rect x="0" y="35" width="8" height="1.5" fill="#B88848" opacity="0.4"/>
      <rect x="0" y="48" width="8" height="2" fill="#D0A870" opacity="0.3"/>
    </pattern>
    <pattern id="glass-tex" width="20" height="20" patternUnits="userSpaceOnUse">
      <rect width="20" height="20" fill="#8AAEC8"/>
      <line x1="0" y1="0" x2="20" y2="20" stroke="#A0C0D8" stroke-width="0.5" opacity="0.4"/>
    </pattern>
    <pattern id="stone-tex" width="40" height="30" patternUnits="userSpaceOnUse">
      <rect width="40" height="30" fill="#9A9288"/>
      <rect x="2" y="2" width="36" height="11" fill="#A09890" rx="1"/>
      <rect x="22" y="15" width="16" height="11" fill="#989088" rx="1"/>
      <rect x="2" y="15" width="18" height="11" fill="#A29A90" rx="1"/>
    </pattern>
    <pattern id="steel-tex" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="4" fill="#989898"/>
      <line x1="0" y1="2" x2="4" y2="2" stroke="#888888" stroke-width="0.5" opacity="0.5"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="900" height="600" fill="#F5F0E8"/>

  <!-- Title -->
  <text x="450" y="50" font-family="Georgia, serif" font-size="20" fill="#3A3530" text-anchor="middle" letter-spacing="6">PALETA DE MATERIALES</text>
  <line x1="100" y1="62" x2="800" y2="62" stroke="#C0B8A8" stroke-width="1"/>

  <!-- Swatch 1 - Concrete -->
  <rect x="80" y="90" width="150" height="150" fill="url(#concrete-tex)" rx="2"/>
  <rect x="80" y="90" width="150" height="150" fill="none" stroke="#8A8278" stroke-width="1.5" rx="2"/>
  <text x="155" y="264" font-family="Georgia, serif" font-size="12" fill="#3A3530" text-anchor="middle" letter-spacing="1">HORMIGÓN VISTO</text>
  <text x="155" y="280" font-family="Georgia, serif" font-size="10" fill="#7A7268" text-anchor="middle">#B0A898</text>

  <!-- Swatch 2 - Wood -->
  <rect x="270" y="90" width="150" height="150" fill="url(#wood-tex)" rx="2"/>
  <rect x="270" y="90" width="150" height="150" fill="none" stroke="#9A7848" stroke-width="1.5" rx="2"/>
  <text x="345" y="264" font-family="Georgia, serif" font-size="12" fill="#3A3530" text-anchor="middle" letter-spacing="1">MADERA IPOMA</text>
  <text x="345" y="280" font-family="Georgia, serif" font-size="10" fill="#7A7268" text-anchor="middle">#C89860</text>

  <!-- Swatch 3 - Glass -->
  <rect x="460" y="90" width="150" height="150" fill="url(#glass-tex)" rx="2" opacity="0.9"/>
  <rect x="460" y="90" width="150" height="150" fill="none" stroke="#6890A8" stroke-width="1.5" rx="2"/>
  <text x="535" y="264" font-family="Georgia, serif" font-size="12" fill="#3A3530" text-anchor="middle" letter-spacing="1">VIDRIO LAMINADO</text>
  <text x="535" y="280" font-family="Georgia, serif" font-size="10" fill="#7A7268" text-anchor="middle">#8AAEC8</text>

  <!-- Swatch 4 - Stone -->
  <rect x="650" y="90" width="150" height="150" fill="url(#stone-tex)" rx="2"/>
  <rect x="650" y="90" width="150" height="150" fill="none" stroke="#7A7268" stroke-width="1.5" rx="2"/>
  <text x="725" y="264" font-family="Georgia, serif" font-size="12" fill="#3A3530" text-anchor="middle" letter-spacing="1">PIEDRA CALIZA</text>
  <text x="725" y="280" font-family="Georgia, serif" font-size="10" fill="#7A7268" text-anchor="middle">#9A9288</text>

  <!-- Swatch 5 - Steel -->
  <rect x="175" y="320" width="150" height="150" fill="url(#steel-tex)" rx="2"/>
  <rect x="175" y="320" width="150" height="150" fill="none" stroke="#787878" stroke-width="1.5" rx="2"/>
  <text x="250" y="494" font-family="Georgia, serif" font-size="12" fill="#3A3530" text-anchor="middle" letter-spacing="1">ACERO INOX.</text>
  <text x="250" y="510" font-family="Georgia, serif" font-size="10" fill="#7A7268" text-anchor="middle">#989898</text>

  <!-- Swatch 6 - Plaster white -->
  <rect x="375" y="320" width="150" height="150" fill="#F0EBE2" rx="2"/>
  <rect x="375" y="320" width="150" height="150" fill="none" stroke="#C0B8A8" stroke-width="1.5" rx="2"/>
  <!-- subtle texture -->
  <line x1="380" y1="340" x2="520" y2="340" stroke="#E8E0D0" stroke-width="0.8"/>
  <line x1="380" y1="360" x2="520" y2="360" stroke="#E8E0D0" stroke-width="0.8"/>
  <line x1="380" y1="380" x2="520" y2="380" stroke="#E8E0D0" stroke-width="0.8"/>
  <line x1="380" y1="400" x2="520" y2="400" stroke="#E8E0D0" stroke-width="0.8"/>
  <line x1="380" y1="420" x2="520" y2="420" stroke="#E8E0D0" stroke-width="0.8"/>
  <line x1="380" y1="440" x2="520" y2="440" stroke="#E8E0D0" stroke-width="0.8"/>
  <line x1="380" y1="460" x2="520" y2="460" stroke="#E8E0D0" stroke-width="0.8"/>
  <text x="450" y="494" font-family="Georgia, serif" font-size="12" fill="#3A3530" text-anchor="middle" letter-spacing="1">ENLUCIDO BLANCO</text>
  <text x="450" y="510" font-family="Georgia, serif" font-size="10" fill="#7A7268" text-anchor="middle">#F0EBE2</text>

  <!-- Swatch 7 - Dark metal -->
  <rect x="575" y="320" width="150" height="150" fill="#383430" rx="2"/>
  <rect x="575" y="320" width="150" height="150" fill="none" stroke="#484038" stroke-width="1.5" rx="2"/>
  <line x1="580" y1="355" x2="720" y2="355" stroke="#484038" stroke-width="0.8" opacity="0.5"/>
  <line x1="580" y1="395" x2="720" y2="395" stroke="#484038" stroke-width="0.8" opacity="0.5"/>
  <line x1="580" y1="435" x2="720" y2="435" stroke="#484038" stroke-width="0.8" opacity="0.5"/>
  <text x="650" y="494" font-family="Georgia, serif" font-size="12" fill="#3A3530" text-anchor="middle" letter-spacing="1">METAL NEGRO MAT</text>
  <text x="650" y="510" font-family="Georgia, serif" font-size="10" fill="#7A7268" text-anchor="middle">#383430</text>

  <!-- Label -->
  <text x="450" y="570" font-family="Georgia, serif" font-size="10" fill="#A09888" text-anchor="middle" letter-spacing="3">08 / MATERIAL BOARD · 900 × 600</text>
</svg>
