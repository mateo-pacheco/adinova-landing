<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700" width="1000" height="700">
  <defs>
    <linearGradient id="grass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8CAA78"/>
      <stop offset="100%" stop-color="#7A9868"/>
    </linearGradient>
    <linearGradient id="road" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#888078"/>
      <stop offset="100%" stop-color="#787068"/>
    </linearGradient>
  </defs>

  <!-- Ground base -->
  <rect width="1000" height="700" fill="url(#grass)"/>

  <!-- Road horizontal -->
  <rect x="0" y="0" width="1000" height="90" fill="url(#road)"/>
  <rect x="0" y="87" width="1000" height="5" fill="#706860"/>
  <!-- Road dashes -->
  <rect x="50" y="42" width="80" height="6" rx="3" fill="#C8C0B0" opacity="0.7"/>
  <rect x="200" y="42" width="80" height="6" rx="3" fill="#C8C0B0" opacity="0.7"/>
  <rect x="350" y="42" width="80" height="6" rx="3" fill="#C8C0B0" opacity="0.7"/>
  <rect x="500" y="42" width="80" height="6" rx="3" fill="#C8C0B0" opacity="0.7"/>
  <rect x="650" y="42" width="80" height="6" rx="3" fill="#C8C0B0" opacity="0.7"/>
  <rect x="800" y="42" width="80" height="6" rx="3" fill="#C8C0B0" opacity="0.7"/>

  <!-- Road vertical right -->
  <rect x="850" y="0" width="90" height="700" fill="url(#road)"/>
  <rect x="847" y="0" width="5" height="700" fill="#706860"/>
  <!-- Road dashes vertical -->
  <rect x="890" y="150" width="6" height="60" rx="3" fill="#C8C0B0" opacity="0.7"/>
  <rect x="890" y="280" width="6" height="60" rx="3" fill="#C8C0B0" opacity="0.7"/>
  <rect x="890" y="410" width="6" height="60" rx="3" fill="#C8C0B0" opacity="0.7"/>
  <rect x="890" y="540" width="6" height="60" rx="3" fill="#C8C0B0" opacity="0.7"/>

  <!-- Sidewalk -->
  <rect x="0" y="87" width="850" height="18" fill="#C0B8A8"/>
  <rect x="850" y="87" width="18" height="613" fill="#C0B8A8"/>

  <!-- Main building footprint -->
  <rect x="150" y="160" width="420" height="310" fill="#A8A098" rx="2"/>
  <!-- Building shadow -->
  <rect x="158" y="168" width="420" height="310" fill="#00000025" rx="2"/>
  <!-- Building top face -->
  <rect x="150" y="160" width="420" height="310" fill="#C0B8B0" rx="2"/>
  <!-- Roof structure lines -->
  <line x1="150" y1="315" x2="570" y2="315" stroke="#B0A8A0" stroke-width="2"/>
  <line x1="360" y1="160" x2="360" y2="470" stroke="#B0A8A0" stroke-width="2"/>

  <!-- Annex building -->
  <rect x="570" y="240" width="200" height="180" fill="#B8B0A8" rx="2"/>
  <rect x="576" y="246" width="200" height="180" fill="#00000020" rx="2"/>
  <rect x="570" y="240" width="200" height="180" fill="#C8C0B8" rx="2"/>

  <!-- Parking lot -->
  <rect x="150" y="510" width="420" height="120" fill="#A0988C"/>
  <!-- Parking lines -->
  <line x1="190" y1="510" x2="190" y2="630" stroke="#C0B8A8" stroke-width="1.5"/>
  <line x1="230" y1="510" x2="230" y2="630" stroke="#C0B8A8" stroke-width="1.5"/>
  <line x1="270" y1="510" x2="270" y2="630" stroke="#C0B8A8" stroke-width="1.5"/>
  <line x1="310" y1="510" x2="310" y2="630" stroke="#C0B8A8" stroke-width="1.5"/>
  <line x1="350" y1="510" x2="350" y2="630" stroke="#C0B8A8" stroke-width="1.5"/>
  <line x1="390" y1="510" x2="390" y2="630" stroke="#C0B8A8" stroke-width="1.5"/>
  <line x1="430" y1="510" x2="430" y2="630" stroke="#C0B8A8" stroke-width="1.5"/>
  <line x1="470" y1="510" x2="470" y2="630" stroke="#C0B8A8" stroke-width="1.5"/>
  <line x1="510" y1="510" x2="510" y2="630" stroke="#C0B8A8" stroke-width="1.5"/>
  <line x1="550" y1="510" x2="550" y2="630" stroke="#C0B8A8" stroke-width="1.5"/>
  <!-- Cars (top view) -->
  <rect x="196" y="530" width="28" height="56" rx="3" fill="#8A8880"/>
  <rect x="236" y="530" width="28" height="56" rx="3" fill="#787068"/>
  <rect x="356" y="530" width="28" height="56" rx="3" fill="#8A8880"/>
  <rect x="436" y="542" width="28" height="56" rx="3" fill="#706860"/>

  <!-- Trees (top view - circles) -->
  <circle cx="110" cy="200" r="28" fill="#5A8048" opacity="0.85"/>
  <circle cx="110" cy="200" r="18" fill="#6A9058" opacity="0.7"/>
  <circle cx="110" cy="300" r="28" fill="#5A8048" opacity="0.85"/>
  <circle cx="110" cy="300" r="18" fill="#6A9058" opacity="0.7"/>
  <circle cx="110" cy="400" r="28" fill="#5A8048" opacity="0.85"/>
  <circle cx="110" cy="400" r="18" fill="#6A9058" opacity="0.7"/>

  <circle cx="650" cy="540" r="22" fill="#5A8048" opacity="0.85"/>
  <circle cx="650" cy="540" r="14" fill="#6A9058" opacity="0.7"/>
  <circle cx="710" cy="540" r="22" fill="#5A8048" opacity="0.85"/>
  <circle cx="710" cy="540" r="14" fill="#6A9058" opacity="0.7"/>
  <circle cx="780" cy="540" r="22" fill="#5A8048" opacity="0.85"/>
  <circle cx="780" cy="540" r="14" fill="#6A9058" opacity="0.7"/>

  <!-- Water feature -->
  <ellipse cx="680" cy="340" rx="60" ry="40" fill="#7AAABB" opacity="0.7"/>
  <ellipse cx="680" cy="340" rx="48" ry="30" fill="#8ABCCC" opacity="0.5"/>

  <!-- Compass -->
  <circle cx="940" cy="640" r="36" fill="#F0EAE0" stroke="#3A3530" stroke-width="1.5" opacity="0.9"/>
  <polygon points="940,612 935,648 940,644 945,648" fill="#3A3530"/>
  <polygon points="940,668 935,632 940,636 945,632" fill="#B0A898"/>
  <text x="940" y="608" font-family="Georgia, serif" font-size="11" fill="#3A3530" text-anchor="middle">N</text>

  <!-- Label -->
  <text x="500" y="672" font-family="Georgia, serif" font-size="12" fill="#F0EAE0" text-anchor="middle" letter-spacing="4">IMPLANTACIÓN GENERAL · VISTA AÉREA</text>
  <text x="500" y="690" font-family="Georgia, serif" font-size="10" fill="#D0C8B8" text-anchor="middle" letter-spacing="2">05 / SITE PLAN · 1000 × 700</text>
</svg>
