<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 800" width="1440" height="800">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D4C9B8"/>
      <stop offset="60%" stop-color="#E8E0D0"/>
      <stop offset="100%" stop-color="#F2EDE4"/>
    </linearGradient>
    <linearGradient id="concrete" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C8C0B0"/>
      <stop offset="100%" stop-color="#9A9488"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8BA5B8" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#5A7A92" stop-opacity="0.5"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="-8" dy="12" stdDeviation="16" flood-color="#00000030"/>
    </filter>
  </defs>

  <!-- Sky -->
  <rect width="1440" height="800" fill="url(#sky)"/>

  <!-- Ground -->
  <rect x="0" y="680" width="1440" height="120" fill="#B0A898"/>
  <rect x="0" y="675" width="1440" height="8" fill="#9A9080"/>

  <!-- Left wing building -->
  <rect x="80" y="280" width="260" height="400" fill="#C2BAA8" filter="url(#shadow)"/>
  <!-- Window grid left -->
  <g fill="url(#glass)">
    <rect x="100" y="300" width="45" height="55"/><rect x="155" y="300" width="45" height="55"/><rect x="210" y="300" width="45" height="55"/><rect x="265" y="300" width="45" height="55"/>
    <rect x="100" y="370" width="45" height="55"/><rect x="155" y="370" width="45" height="55"/><rect x="210" y="370" width="45" height="55"/><rect x="265" y="370" width="45" height="55"/>
    <rect x="100" y="440" width="45" height="55"/><rect x="155" y="440" width="45" height="55"/><rect x="210" y="440" width="45" height="55"/><rect x="265" y="440" width="45" height="55"/>
    <rect x="100" y="510" width="45" height="55"/><rect x="155" y="510" width="45" height="55"/><rect x="210" y="510" width="45" height="55"/><rect x="265" y="510" width="45" height="55"/>
    <rect x="100" y="580" width="45" height="55"/><rect x="155" y="580" width="45" height="55"/><rect x="210" y="580" width="45" height="55"/><rect x="265" y="580" width="45" height="55"/>
  </g>

  <!-- Central tower -->
  <rect x="490" y="120" width="460" height="560" fill="url(#concrete)" filter="url(#shadow)"/>
  <!-- Vertical fins -->
  <rect x="510" y="120" width="18" height="560" fill="#B0A898" opacity="0.6"/>
  <rect x="560" y="120" width="18" height="560" fill="#B0A898" opacity="0.6"/>
  <rect x="610" y="120" width="18" height="560" fill="#B0A898" opacity="0.6"/>
  <rect x="660" y="120" width="18" height="560" fill="#B0A898" opacity="0.6"/>
  <rect x="710" y="120" width="18" height="560" fill="#B0A898" opacity="0.6"/>
  <rect x="760" y="120" width="18" height="560" fill="#B0A898" opacity="0.6"/>
  <rect x="810" y="120" width="18" height="560" fill="#B0A898" opacity="0.6"/>
  <rect x="860" y="120" width="18" height="560" fill="#B0A898" opacity="0.6"/>
  <rect x="910" y="120" width="18" height="560" fill="#B0A898" opacity="0.6"/>
  <!-- Glass facade strips -->
  <rect x="528" y="140" width="24" height="520" fill="url(#glass)"/>
  <rect x="578" y="140" width="24" height="520" fill="url(#glass)"/>
  <rect x="628" y="140" width="24" height="520" fill="url(#glass)"/>
  <rect x="678" y="140" width="24" height="520" fill="url(#glass)"/>
  <rect x="728" y="140" width="24" height="520" fill="url(#glass)"/>
  <rect x="778" y="140" width="24" height="520" fill="url(#glass)"/>
  <rect x="828" y="140" width="24" height="520" fill="url(#glass)"/>
  <rect x="878" y="140" width="24" height="520" fill="url(#glass)"/>

  <!-- Right wing building -->
  <rect x="1100" y="320" width="240" height="360" fill="#C8C0B2" filter="url(#shadow)"/>
  <g fill="url(#glass)">
    <rect x="1118" y="338" width="40" height="50"/><rect x="1168" y="338" width="40" height="50"/><rect x="1218" y="338" width="40" height="50"/><rect x="1268" y="338" width="40" height="50"/>
    <rect x="1118" y="400" width="40" height="50"/><rect x="1168" y="400" width="40" height="50"/><rect x="1218" y="400" width="40" height="50"/><rect x="1268" y="400" width="40" height="50"/>
    <rect x="1118" y="462" width="40" height="50"/><rect x="1168" y="462" width="40" height="50"/><rect x="1218" y="462" width="40" height="50"/><rect x="1268" y="462" width="40" height="50"/>
    <rect x="1118" y="524" width="40" height="50"/><rect x="1168" y="524" width="40" height="50"/><rect x="1218" y="524" width="40" height="50"/><rect x="1268" y="524" width="40" height="50"/>
    <rect x="1118" y="586" width="40" height="50"/><rect x="1168" y="586" width="40" height="50"/><rect x="1218" y="586" width="40" height="50"/><rect x="1268" y="586" width="40" height="50"/>
  </g>

  <!-- Foreground plaza -->
  <rect x="420" y="668" width="600" height="15" fill="#A89E90"/>
  <!-- Steps -->
  <rect x="460" y="655" width="520" height="16" fill="#B0A898"/>
  <rect x="490" y="642" width="460" height="16" fill="#B8B0A0"/>

  <!-- Sun / light source -->
  <circle cx="1320" cy="80" r="45" fill="#E8D8B8" opacity="0.6"/>
  <circle cx="1320" cy="80" r="30" fill="#F0E4C8" opacity="0.8"/>

  <!-- Label -->
  <text x="720" y="750" font-family="Georgia, serif" font-size="13" fill="#6A6258" text-anchor="middle" letter-spacing="4">PROYECTO TORRES CÍVICAS · FACHADA PRINCIPAL</text>
  <text x="720" y="770" font-family="Georgia, serif" font-size="11" fill="#9A9088" text-anchor="middle" letter-spacing="2">01 / HERO FAÇADE · 1440 × 800</text>
</svg>
