<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 700" width="1100" height="700">
  <defs>
    <linearGradient id="sky3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C0CEDC"/>
      <stop offset="70%" stop-color="#D8E4EE"/>
      <stop offset="100%" stop-color="#EAF0F6"/>
    </linearGradient>
    <linearGradient id="face-front" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C8C0B4"/>
      <stop offset="100%" stop-color="#A8A098"/>
    </linearGradient>
    <linearGradient id="face-side" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#9A9288"/>
      <stop offset="100%" stop-color="#888078"/>
    </linearGradient>
    <linearGradient id="face-top" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D8D0C8"/>
      <stop offset="100%" stop-color="#C0B8B0"/>
    </linearGradient>
    <linearGradient id="win-persp" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6898B8" stop-opacity="0.7"/>
      <stop offset="40%" stop-color="#90B8D0" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#507898" stop-opacity="0.8"/>
    </linearGradient>
    <linearGradient id="ground2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#B8B0A4"/>
      <stop offset="100%" stop-color="#908880"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="1100" height="700" fill="url(#sky3)"/>

  <!-- Clouds -->
  <ellipse cx="180" cy="100" rx="80" ry="28" fill="#FFFFFF" opacity="0.55"/>
  <ellipse cx="240" cy="88" rx="60" ry="22" fill="#FFFFFF" opacity="0.45"/>
  <ellipse cx="800" cy="70" rx="90" ry="24" fill="#FFFFFF" opacity="0.5"/>
  <ellipse cx="860" cy="58" rx="65" ry="20" fill="#FFFFFF" opacity="0.4"/>

  <!-- Ground -->
  <polygon points="0,560 1100,520 1100,700 0,700" fill="url(#ground2)"/>

  <!-- Ground plane lines (perspective) -->
  <line x1="200" y1="700" x2="550" y2="560" stroke="#A8A098" stroke-width="1" opacity="0.4"/>
  <line x1="400" y1="700" x2="600" y2="560" stroke="#A8A098" stroke-width="1" opacity="0.4"/>
  <line x1="600" y1="700" x2="680" y2="560" stroke="#A8A098" stroke-width="1" opacity="0.3"/>

  <!-- === MAIN BUILDING (perspective) === -->
  <!-- Front face (left) -->
  <polygon points="180,130 640,130 640,560 180,560" fill="url(#face-front)"/>
  <!-- Side face (right, in perspective) -->
  <polygon points="640,130 840,160 840,570 640,560" fill="url(#face-side)"/>
  <!-- Top face -->
  <polygon points="180,130 640,130 840,160 380,125" fill="url(#face-top)"/>

  <!-- Front windows - 5 floors x 6 columns -->
  <g fill="url(#win-persp)">
    <!-- Floor 5 -->
    <rect x="210" y="148" width="68" height="52"/><rect x="290" y="148" width="68" height="52"/>
    <rect x="370" y="148" width="68" height="52"/><rect x="450" y="148" width="68" height="52"/>
    <rect x="530" y="148" width="68" height="52"/><rect x="610" y="148" width="22" height="52"/>
    <!-- Floor 4 -->
    <rect x="210" y="218" width="68" height="52"/><rect x="290" y="218" width="68" height="52"/>
    <rect x="370" y="218" width="68" height="52"/><rect x="450" y="218" width="68" height="52"/>
    <rect x="530" y="218" width="68" height="52"/><rect x="610" y="218" width="22" height="52"/>
    <!-- Floor 3 -->
    <rect x="210" y="288" width="68" height="52"/><rect x="290" y="288" width="68" height="52"/>
    <rect x="370" y="288" width="68" height="52"/><rect x="450" y="288" width="68" height="52"/>
    <rect x="530" y="288" width="68" height="52"/><rect x="610" y="288" width="22" height="52"/>
    <!-- Floor 2 -->
    <rect x="210" y="358" width="68" height="52"/><rect x="290" y="358" width="68" height="52"/>
    <rect x="370" y="358" width="68" height="52"/><rect x="450" y="358" width="68" height="52"/>
    <rect x="530" y="358" width="68" height="52"/><rect x="610" y="358" width="22" height="52"/>
    <!-- Floor 1 -->
    <rect x="210" y="428" width="68" height="52"/><rect x="290" y="428" width="68" height="52"/>
    <rect x="370" y="428" width="68" height="52"/><rect x="450" y="428" width="68" height="52"/>
    <rect x="530" y="428" width="68" height="52"/><rect x="610" y="428" width="22" height="52"/>
  </g>
  <!-- Ground floor entrance -->
  <rect x="340" y="490" width="140" height="70" fill="#6898B8" opacity="0.5"/>
  <line x1="410" y1="490" x2="410" y2="560" stroke="#90B0C8" stroke-width="2"/>

  <!-- Side windows (perspective, foreshortened) -->
  <g fill="url(#win-persp)" opacity="0.7">
    <polygon points="650,152 700,157 700,200 650,195"/>
    <polygon points="710,158 760,164 760,207 710,201"/>
    <polygon points="770,165 820,171 820,214 770,208"/>

    <polygon points="650,222 700,227 700,270 650,265"/>
    <polygon points="710,228 760,234 760,277 710,271"/>
    <polygon points="770,235 820,241 820,284 770,278"/>

    <polygon points="650,292 700,297 700,340 650,335"/>
    <polygon points="710,298 760,304 760,347 710,341"/>
    <polygon points="770,305 820,311 820,354 770,348"/>

    <polygon points="650,362 700,367 700,410 650,405"/>
    <polygon points="710,368 760,374 760,417 710,411"/>
    <polygon points="770,375 820,381 820,424 770,418"/>
  </g>

  <!-- Window reflections (subtle) -->
  <rect x="212" y="150" width="25" height="6" fill="#FFFFFF" opacity="0.15" rx="1"/>
  <rect x="372" y="220" width="25" height="6" fill="#FFFFFF" opacity="0.12" rx="1"/>
  <rect x="452" y="290" width="25" height="6" fill="#FFFFFF" opacity="0.18" rx="1"/>

  <!-- Building outline -->
  <polygon points="180,130 640,130 840,160 840,570 640,560 180,560" fill="none" stroke="#888080" stroke-width="1.5"/>
  <polygon points="640,130 840,160 840,570 640,560" fill="none" stroke="#888080" stroke-width="1.5"/>
  <polygon points="180,130 640,130 840,160 380,125" fill="none" stroke="#888080" stroke-width="1.5"/>

  <!-- Trees foreground -->
  <rect x="100" y="420" width="14" height="140" fill="#5A5048"/>
  <ellipse cx="107" cy="400" rx="35" ry="55" fill="#5A7A48" opacity="0.9"/>
  <ellipse cx="107" cy="400" rx="22" ry="35" fill="#6A8A58" opacity="0.7"/>

  <rect x="920" y="430" width="14" height="130" fill="#5A5048"/>
  <ellipse cx="927" cy="412" rx="38" ry="50" fill="#5A7A48" opacity="0.9"/>
  <ellipse cx="927" cy="412" rx="24" ry="32" fill="#6A8A58" opacity="0.7"/>

  <!-- Label -->
  <text x="550" y="660" font-family="Georgia, serif" font-size="12" fill="#7A7268" text-anchor="middle" letter-spacing="4">PERSPECTIVA GENERAL · VISTA SUR-OESTE</text>
  <text x="550" y="680" font-family="Georgia, serif" font-size="10" fill="#9A9288" text-anchor="middle" letter-spacing="2">09 / PERSPECTIVE RENDER · 1100 × 700</text>
</svg>
