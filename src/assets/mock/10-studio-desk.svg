<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="bg-studio" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8E0D4"/>
      <stop offset="100%" stop-color="#D8D0C4"/>
    </linearGradient>
    <linearGradient id="desk-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C89868"/>
      <stop offset="100%" stop-color="#A87848"/>
    </linearGradient>
    <linearGradient id="lamp-light" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF0C0" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#F8D880" stop-opacity="0.1"/>
    </linearGradient>
    <filter id="soft">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#bg-studio)"/>

  <!-- Back wall -->
  <rect x="0" y="0" width="800" height="380" fill="#EDE5D8"/>
  <!-- Wall shadow at ceiling -->
  <rect x="0" y="0" width="800" height="8" fill="#C8C0B4"/>

  <!-- Bookshelf / storage on back wall -->
  <rect x="540" y="40" width="220" height="280" fill="#C0B8A8" rx="2"/>
  <!-- Shelf lines -->
  <line x1="540" y1="100" x2="760" y2="100" stroke="#A8A090" stroke-width="3"/>
  <line x1="540" y1="170" x2="760" y2="170" stroke="#A8A090" stroke-width="3"/>
  <line x1="540" y1="240" x2="760" y2="240" stroke="#A8A090" stroke-width="3"/>
  <!-- Books on shelf -->
  <rect x="548" y="45" width="14" height="52" fill="#8A7060" rx="1"/>
  <rect x="564" y="48" width="18" height="49" fill="#606858" rx="1"/>
  <rect x="584" y="43" width="12" height="54" fill="#987858" rx="1"/>
  <rect x="598" y="50" width="20" height="47" fill="#787060" rx="1"/>
  <rect x="620" y="45" width="15" height="52" fill="#6A8070" rx="1"/>
  <rect x="637" y="49" width="12" height="48" fill="#907068" rx="1"/>
  <rect x="651" y="44" width="22" height="53" fill="#5A6878" rx="1"/>
  <rect x="675" y="48" width="14" height="49" fill="#8A7850" rx="1"/>
  <rect x="691" y="43" width="18" height="54" fill="#706058" rx="1"/>
  <rect x="711" y="47" width="16" height="50" fill="#685870" rx="1"/>
  <rect x="729" y="44" width="18" height="53" fill="#7A8068" rx="1"/>
  <!-- Binder/folder -->
  <rect x="548" y="175" width="40" height="62" rx="1" fill="#A09080"/>
  <rect x="548" y="178" width="40" height="4" fill="#908070"/>
  <rect x="600" y="175" width="30" height="62" rx="1" fill="#8A7070"/>
  <rect x="638" y="175" width="45" height="62" rx="1" fill="#9A9080"/>
  <rect x="695" y="175" width="28" height="62" rx="1" fill="#8A9070"/>
  <rect x="730" y="175" width="22" height="62" rx="1" fill="#907880"/>
  <!-- Scale model on bottom shelf -->
  <rect x="558" y="248" width="60" height="22" rx="1" fill="#C0B8A8"/>
  <rect x="568" y="240" width="40" height="14" rx="1" fill="#B8B0A0"/>
  <rect x="578" y="234" width="20" height="10" rx="1" fill="#C0B8A8"/>
  <!-- Small plant -->
  <rect x="690" y="245" width="16" height="22" rx="2" fill="#7A6850"/>
  <ellipse cx="698" cy="238" rx="14" ry="18" fill="#5A8050" opacity="0.9"/>
  <ellipse cx="690" cy="244" rx="10" ry="13" fill="#6A9060" opacity="0.8"/>

  <!-- Framed drawings on wall -->
  <rect x="60" y="40" width="200" height="140" fill="#FAFAF5" stroke="#8A8278" stroke-width="4" rx="1"/>
  <rect x="66" y="46" width="188" height="128" fill="none" stroke="#D0C8BC" stroke-width="1"/>
  <!-- Floor plan inside frame -->
  <rect x="90" y="62" width="140" height="96" fill="none" stroke="#4A4540" stroke-width="2"/>
  <line x1="160" y1="62" x2="160" y2="158" stroke="#4A4540" stroke-width="1.5"/>
  <line x1="90" y1="110" x2="230" y2="110" stroke="#4A4540" stroke-width="1.5"/>
  <rect x="168" y="68" width="56" height="38" fill="none" stroke="#4A4540" stroke-width="1"/>
  <rect x="96" y="68" width="58" height="38" fill="none" stroke="#4A4540" stroke-width="1"/>

  <rect x="290" y="40" width="200" height="140" fill="#FAFAF5" stroke="#8A8278" stroke-width="4" rx="1"/>
  <rect x="296" y="46" width="188" height="128" fill="none" stroke="#D0C8BC" stroke-width="1"/>
  <!-- Section drawing inside frame -->
  <rect x="312" y="80" width="160" height="80" fill="none" stroke="#4A4540" stroke-width="2"/>
  <line x1="312" y1="110" x2="472" y2="110" stroke="#4A4540" stroke-width="1"/>
  <line x1="392" y1="80" x2="392" y2="160" stroke="#4A4540" stroke-width="1"/>
  <rect x="320" y="116" width="60" height="40" fill="none" stroke="#4A4540" stroke-width="1"/>
  <rect x="398" y="116" width="60" height="40" fill="none" stroke="#4A4540" stroke-width="1"/>

  <!-- Desk surface -->
  <rect x="0" y="360" width="800" height="28" fill="url(#desk-grad)"/>
  <rect x="0" y="386" width="800" height="180" fill="#8A7858"/>
  <!-- Desk front face -->
  <rect x="0" y="386" width="800" height="14" fill="#7A6848"/>

  <!-- Desk lamp -->
  <line x1="120" y1="360" x2="120" y2="290" stroke="#707068" stroke-width="5"/>
  <line x1="120" y1="290" x2="200" y2="250" stroke="#707068" stroke-width="5"/>
  <ellipse cx="200" cy="244" rx="32" ry="18" fill="#C8C0A0" opacity="0.9"/>
  <!-- Light cone -->
  <polygon points="185,260 215,260 320,362 80,362" fill="url(#lamp-light)" opacity="0.6"/>

  <!-- Drawing on desk (large format paper) -->
  <rect x="80" y="290" width="480" height="70" fill="#FAFAF5" rx="2" opacity="0.95"/>
  <!-- Drawing content (section lines) -->
  <rect x="110" y="305" width="420" height="45" fill="none" stroke="#9A9288" stroke-width="1.5"/>
  <line x1="110" y1="322" x2="530" y2="322" stroke="#9A9288" stroke-width="1"/>
  <line x1="280" y1="305" x2="280" y2="350" stroke="#9A9288" stroke-width="1"/>
  <line x1="390" y1="305" x2="390" y2="350" stroke="#9A9288" stroke-width="1"/>
  <rect x="118" y="328" width="155" height="20" fill="none" stroke="#8A8278" stroke-width="1"/>
  <rect x="288" y="328" width="95" height="20" fill="none" stroke="#8A8278" stroke-width="1"/>
  <rect x="398" y="328" width="125" height="20" fill="none" stroke="#8A8278" stroke-width="1"/>

  <!-- Pencils, tools -->
  <rect x="590" y="325" width="6" height="40" rx="3" fill="#F0D850" transform="rotate(-8 590 325)"/>
  <rect x="604" y="323" width="6" height="40" rx="3" fill="#E04040" transform="rotate(3 604 323)"/>
  <rect x="616" y="326" width="5" height="40" rx="3" fill="#C0B8A8" transform="rotate(-5 616 326)"/>
  <!-- Ruler -->
  <rect x="590" y="352" width="130" height="8" rx="1" fill="#D0C8B8" opacity="0.9"/>
  <line x1="600" y1="352" x2="600" y2="360" stroke="#A09888" stroke-width="0.8"/>
  <line x1="610" y1="352" x2="610" y2="360" stroke="#A09888" stroke-width="0.8"/>
  <line x1="620" y1="352" x2="620" y2="360" stroke="#A09888" stroke-width="0.8"/>
  <line x1="630" y1="352" x2="630" y2="360" stroke="#A09888" stroke-width="0.8"/>
  <line x1="640" y1="352" x2="640" y2="360" stroke="#A09888" stroke-width="0.8"/>
  <line x1="650" y1="352" x2="650" y2="360" stroke="#A09888" stroke-width="0.8"/>
  <line x1="660" y1="352" x2="660" y2="360" stroke="#A09888" stroke-width="0.8"/>
  <line x1="670" y1="352" x2="670" y2="360" stroke="#A09888" stroke-width="0.8"/>
  <line x1="680" y1="352" x2="680" y2="360" stroke="#A09888" stroke-width="0.8"/>
  <line x1="690" y1="352" x2="690" y2="360" stroke="#A09888" stroke-width="0.8"/>
  <line x1="700" y1="352" x2="700" y2="360" stroke="#A09888" stroke-width="0.8"/>
  <line x1="710" y1="352" x2="710" y2="360" stroke="#A09888" stroke-width="0.8"/>

  <!-- Coffee cup -->
  <ellipse cx="730" cy="348" rx="22" ry="12" fill="#D0C8B8"/>
  <rect x="708" y="348" width="44" height="18" rx="4" fill="#D0C8B8"/>
  <ellipse cx="730" cy="366" rx="22" ry="8" fill="#C0B8A8"/>
  <!-- Coffee inside -->
  <ellipse cx="730" cy="349" rx="18" ry="9" fill="#6A4830" opacity="0.8"/>
  <!-- Handle -->
  <path d="M752 352 Q768 352 768 360 Q768 368 752 368" fill="none" stroke="#C0B8A8" stroke-width="4"/>

  <!-- Label -->
  <text x="400" y="545" font-family="Georgia, serif" font-size="12" fill="#EDE5D8" text-anchor="middle" letter-spacing="4">ESTUDIO DE DISEÑO · MESA DE TRABAJO</text>
  <text x="400" y="565" font-family="Georgia, serif" font-size="10" fill="#C8C0B0" text-anchor="middle" letter-spacing="2">10 / STUDIO · 800 × 600</text>
</svg>
